<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Seções — Immerse Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff0f;
    --border-hover: #ffffff22;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a50;
    --tag-bg: #ffffff08;
    --tag-border: #ffffff12;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW BG ── */
  .bg-glow {
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, #4f6ef712 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0a0a0fcc;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  /* ── SEARCH ── */
  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--accent); }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  aside {
    width: 220px;
    min-width: 220px;
    padding: 2rem 1.5rem;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
  }

  .sidebar-section { margin-bottom: 2rem; }

  .sidebar-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    padding-left: 0.5rem;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }

  .filter-btn:hover { background: var(--surface2); color: var(--text); }

  .filter-btn.active {
    background: var(--accent)18;
    color: var(--accent);
    font-weight: 600;
  }

  .filter-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ── TYPE BADGES ── */
  .type-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }

  .type-btn:hover { background: var(--surface2); color: var(--text); }
  .type-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }

  .type-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .dot-html { background: var(--green); }
  .dot-json { background: var(--accent); }
  .dot-css  { background: var(--amber); }
  .dot-all  { background: var(--text-muted); }

  /* ── MAIN ── */
  main {
    flex: 1;
    padding: 2rem;
    min-height: calc(100vh - 64px);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px #00000060;
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    transition: transform 0.4s ease;
  }

  .card:hover .card-preview img { transform: scale(1.03); }

  .card-preview-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  .card-preview-empty svg { opacity: 0.2; }

  /* hover overlay */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: #00000080;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-overlay { opacity: 1; }

  .overlay-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }

  .card-body {
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .card-name {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
  }

  .type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }

  .badge-html   { background: #22c55e18; color: var(--green);  border: 1px solid #22c55e20; }
  .badge-json   { background: #4f6ef718; color: var(--accent); border: 1px solid #4f6ef720; }
  .badge-css    { background: #f59e0b18; color: var(--amber);  border: 1px solid #f59e0b20; }
  .badge-pagina { background: #a855f718; color: var(--purple); border: 1px solid #a855f720; }

  /* card de página completa — borda roxa sutil */
  .card.is-pagina { border-color: #a855f722; }
  .card.is-pagina:hover { border-color: #a855f744; }

  .dot-pagina { background: var(--purple); }

  .card-category {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ── MODAL ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 18px;
    width: 100%;
    max-width: 860px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .modal-title { font-size: 1.1rem; font-weight: 800; }

  .modal-meta { display: flex; align-items: center; gap: 0.75rem; }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-preview {
    background: #fff;
    border-bottom: 1px solid var(--border);
    max-height: 280px;
    overflow: hidden;
    position: relative;
  }

  .modal-preview img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    object-position: top;
  }

  .modal-preview-empty {
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.8rem;
    background: var(--surface2);
  }

  .modal-code-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .code-toolbar {
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .code-toolbar-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .copy-btn:hover { filter: brightness(1.15); }
  .copy-btn.copied { background: var(--green); }

  .code-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.5rem;
  }

  pre {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #a8b5d8;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .empty-state svg { opacity: 0.2; }
  .empty-state p { font-size: 0.875rem; }

  /* ── ADD SECTION BTN ── */
  .add-card {
    background: none;
    border: 1px dashed var(--border-hover);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    min-height: 200px;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
  }

  .add-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent)08;
  }

  /* ── ADD MODAL ── */
  .add-modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    backdrop-filter: blur(8px);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .add-modal-bg.open { display: flex; }

  .add-modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 18px;
    width: 100%;
    max-width: 600px;
    padding: 2rem;
    animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .add-modal h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; }

  .form-group {
    margin-bottom: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-group textarea {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    resize: vertical;
    min-height: 120px;
  }

  .form-group select option { background: var(--surface2); }

  .form-row { display: flex; gap: 1rem; }
  .form-row .form-group { flex: 1; }

  .form-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--border-hover); }

  .btn-save {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-save:hover { filter: brightness(1.15); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  /* ── CARD ACTIONS ── */
  .card-actions {
    display: flex;
    gap: 0.4rem;
    padding: 0 1.25rem 1rem;
  }

  .btn-edit, .btn-delete {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 0;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
  }

  .btn-edit {
    background: var(--surface2);
    color: var(--text-muted);
  }

  .btn-edit:hover {
    background: var(--accent)18;
    border-color: var(--accent)44;
    color: var(--accent);
  }

  .btn-delete {
    background: var(--surface2);
    color: var(--text-muted);
  }

  .btn-delete:hover {
    background: #ef444418;
    border-color: #ef444444;
    color: var(--red);
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Immerse <span>/ Biblioteca</span>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar seção...">
  </div>

  <span class="count-badge" id="count-label">0 seções</span>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Categorias</div>
      <button class="filter-btn active" data-filter="all" onclick="filterCategory(this, 'all')">
        Todas <span class="filter-count" id="count-all">0</span>
      </button>
      <button class="filter-btn" data-filter="hero" onclick="filterCategory(this, 'hero')">
        Hero <span class="filter-count" id="count-hero">0</span>
      </button>
      <button class="filter-btn" data-filter="cta" onclick="filterCategory(this, 'cta')">
        CTA <span class="filter-count" id="count-cta">0</span>
      </button>
      <button class="filter-btn" data-filter="depoimento" onclick="filterCategory(this, 'depoimento')">
        Depoimento <span class="filter-count" id="count-depoimento">0</span>
      </button>
      <button class="filter-btn" data-filter="faq" onclick="filterCategory(this, 'faq')">
        FAQ <span class="filter-count" id="count-faq">0</span>
      </button>
      <button class="filter-btn" data-filter="beneficios" onclick="filterCategory(this, 'beneficios')">
        Benefícios <span class="filter-count" id="count-beneficios">0</span>
      </button>
      <button class="filter-btn" data-filter="rodape" onclick="filterCategory(this, 'rodape')">
        Rodapé <span class="filter-count" id="count-rodape">0</span>
      </button>
      <button class="filter-btn" data-filter="carrossel" onclick="filterCategory(this, 'carrossel')">
        Carrossel <span class="filter-count" id="count-carrossel">0</span>
      </button>
      <button class="filter-btn" data-filter="outro" onclick="filterCategory(this, 'outro')">
        Outro <span class="filter-count" id="count-outro">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Páginas</div>
      <button class="filter-btn" data-filter="pagina" onclick="filterCategory(this, 'pagina')" style="color:var(--purple)">
        Páginas completas <span class="filter-count" id="count-pagina">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Tipo de código</div>
      <button class="type-btn active" data-type="all" onclick="filterType(this, 'all')">
        <span class="type-dot dot-all"></span> Todos
      </button>
      <button class="type-btn" data-type="html" onclick="filterType(this, 'html')">
        <span class="type-dot dot-html"></span> HTML/CSS
      </button>
      <button class="type-btn" data-type="json" onclick="filterType(this, 'json')">
        <span class="type-dot dot-json"></span> JSON Elementor
      </button>
      <button class="type-btn" data-type="css" onclick="filterType(this, 'css')">
        <span class="type-dot dot-css"></span> CSS puro
      </button>
      <button class="type-btn" data-type="pagina" onclick="filterType(this, 'pagina')">
        <span class="type-dot dot-pagina"></span> Página completa
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="grid" id="grid">
      <!-- Cards gerados por JS -->
    </div>
  </main>

</div>

<!-- MODAL DE VISUALIZAÇÃO -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">—</div>
        <div class="modal-meta">
          <span class="type-badge" id="modal-badge">—</span>
          <span style="font-size:0.75rem;color:var(--text-muted)" id="modal-category">—</span>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-preview" id="modal-preview-wrap">
      <!-- imagem ou vazio -->
    </div>

    <div class="modal-code-section">
      <div class="code-toolbar">
        <div class="code-toolbar-left">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          código da seção
        </div>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar código
        </button>
      </div>
      <div class="code-area">
        <pre id="modal-code">—</pre>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DE ADICIONAR / EDITAR -->
<div class="add-modal-bg" id="add-modal-bg" onclick="closeAddModal(event)">
  <div class="add-modal">
    <h2 id="add-modal-title">+ Nova seção</h2>
    <input type="hidden" id="inp-edit-id" value="">

    <div class="form-row">
      <div class="form-group">
        <label>Nome da seção</label>
        <input type="text" id="inp-name" placeholder="Ex: Hero com formulário">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="inp-category">
          <option value="hero">Hero</option>
          <option value="cta">CTA</option>
          <option value="depoimento">Depoimento</option>
          <option value="faq">FAQ</option>
          <option value="beneficios">Benefícios</option>
          <option value="rodape">Rodapé</option>
          <option value="carrossel">Carrossel</option>
          <option value="outro">Outro</option>
          <option value="pagina">Página completa</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Tipo de código</label>
        <select id="inp-type">
          <option value="html">HTML/CSS</option>
          <option value="json">JSON Elementor</option>
          <option value="css">CSS puro</option>
          <option value="pagina">Página completa</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL do preview (imagem)</label>
        <input type="text" id="inp-preview" placeholder="https://... ou deixe vazio">
      </div>
    </div>

    <div class="form-group">
      <label>Código</label>
      <textarea id="inp-code" placeholder="Cole aqui o código HTML, JSON ou CSS..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-save" onclick="saveSection()" id="btn-save-label">Salvar seção</button>
    </div>
  </div>
</div>

<script>
// Auto-sync: se categoria = pagina, força tipo = pagina e vice-versa
document.addEventListener('DOMContentLoaded', () => {
  const cat  = document.getElementById('inp-category');
  const type = document.getElementById('inp-type');

  cat.addEventListener('change', () => {
    if (cat.value === 'pagina') type.value = 'pagina';
    else if (type.value === 'pagina') type.value = 'html';
  });

  type.addEventListener('change', () => {
    if (type.value === 'pagina') cat.value = 'pagina';
    else if (cat.value === 'pagina') cat.value = 'outro';
  });
});
// ── DADOS ──────────────────────────────────────────────────────────────
// Carrega do localStorage ou começa vazio
let sections = JSON.parse(localStorage.getItem('immerse-sections') || '[]');

// Estado dos filtros
let currentCategory = 'all';
let currentType = 'all';
let currentSearch = '';

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');

  // Filtrar
  let filtered = sections.filter(s => {
    const matchCat  = currentCategory === 'all' || s.category === currentCategory;
    const matchType = currentType === 'all' || s.type === currentType;
    const matchSearch = !currentSearch ||
      s.name.toLowerCase().includes(currentSearch) ||
      s.category.toLowerCase().includes(currentSearch);
    return matchCat && matchType && matchSearch;
  });

  // Contar por categoria
  const cats = ['all','hero','cta','depoimento','faq','beneficios','rodape','carrossel','outro','pagina'];
  cats.forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = c === 'all' ? sections.length : sections.filter(s => s.category === c).length;
  });

  document.getElementById('count-label').textContent =
    filtered.length + (filtered.length === 1 ? ' seção' : ' seções');

  // Limpar grid
  grid.innerHTML = '';

  // Empty state
  if (filtered.length === 0 && sections.length > 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Nenhuma seção encontrada para essa busca.</p>
    </div>`;
    addPlusCard(grid);
    return;
  }

  // Cards
  filtered.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (s.category === 'pagina' ? ' is-pagina' : '');
    card.innerHTML = `
      <div class="card-preview">
        ${s.preview
          ? `<img src="${s.preview}" alt="${s.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-preview-empty\\'><svg width=\\'32\\' height=\\'32\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1\\' viewBox=\\'0 0 24 24\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><path d=\\'M3 9h18M9 21V9\\'/></svg>SEM PREVIEW</div>'">`
          : `<div class="card-preview-empty">
              <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
              </svg>
              SEM PREVIEW
             </div>`
        }
        <div class="card-overlay">
          <button class="overlay-btn">Ver código</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${s.name}</div>
          <span class="type-badge badge-${s.type}">${s.type === 'pagina' ? 'PÁGINA' : s.type.toUpperCase()}</span>
        </div>
        <div class="card-category">${capitalize(s.category)}</div>
      </div>
      <div class="card-actions">
        <button class="btn-edit" data-id="${s.id}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar
        </button>
        <button class="btn-delete" data-id="${s.id}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          Deletar
        </button>
      </div>
    `;

    // click no card abre modal (exceto nos botões de ação)
    card.onclick = (e) => {
      if (e.target.closest('.btn-edit') || e.target.closest('.btn-delete')) return;
      openModal(s);
    };

    // botão editar
    card.querySelector('.btn-edit').onclick = (e) => {
      e.stopPropagation();
      openEditModal(s);
    };

    // botão deletar
    card.querySelector('.btn-delete').onclick = (e) => {
      e.stopPropagation();
      deleteSection(s.id, s.name);
    };
    grid.appendChild(card);
  });

  // Card de adicionar
  if (sections.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.gridColumn = '1 / -1';
    empty.innerHTML = `
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:0.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p style="font-size:1rem;font-weight:700;color:var(--text)">Biblioteca vazia</p>
      <p>Adicione sua primeira seção usando o botão abaixo.</p>
    `;
    grid.appendChild(empty);
  }

  addPlusCard(grid);
}

function addPlusCard(grid) {
  const plus = document.createElement('button');
  plus.className = 'add-card';
  plus.innerHTML = `
    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
    </svg>
    Adicionar seção
  `;
  plus.onclick = openAddModal;
  grid.appendChild(plus);
}

// ── MODAL DE VER SEÇÃO ────────────────────────────────────────────────
function openModal(s) {
  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-category').textContent = capitalize(s.category);
  document.getElementById('modal-code').textContent = s.code || '// sem código';

  const badge = document.getElementById('modal-badge');
  badge.textContent = s.type === 'pagina' ? 'PÁGINA COMPLETA' : s.type.toUpperCase();
  badge.className = 'type-badge badge-' + s.type;

  // aviso se for página completa
  const existingWarning = document.getElementById('modal-warning');
  if (existingWarning) existingWarning.remove();
  if (s.category === 'pagina') {
    const warn = document.createElement('div');
    warn.id = 'modal-warning';
    warn.style.cssText = 'background:#a855f712;border:1px solid #a855f730;border-radius:8px;padding:8px 14px;font-size:0.75rem;color:#a855f7;margin:0 1.5rem 0 1.5rem;margin-top:0.75rem;';
    warn.innerHTML = '⚡ Página completa — contém múltiplas seções. Copie e cole em um arquivo .html novo.';
    document.querySelector('.modal-code-section').prepend(warn);
  }

  const previewWrap = document.getElementById('modal-preview-wrap');
  if (s.preview) {
    previewWrap.innerHTML = `<img src="${s.preview}" alt="${s.name}">`;
    previewWrap.style.display = '';
  } else {
    previewWrap.innerHTML = `<div class="modal-preview-empty">Sem preview disponível</div>`;
    previewWrap.style.display = '';
  }

  document.getElementById('copy-btn').textContent = 'Copiar código';
  document.getElementById('copy-btn').className = 'copy-btn';
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function copyCode() {
  const code = document.getElementById('modal-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.innerHTML = `
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Copiado!
    `;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = `
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar código
      `;
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── MODAL DE ADICIONAR / EDITAR ────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-modal-title').textContent = '+ Nova seção';
  document.getElementById('btn-save-label').textContent = 'Salvar seção';
  document.getElementById('inp-edit-id').value = '';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-category').value = 'hero';
  document.getElementById('inp-type').value = 'html';
  document.getElementById('inp-preview').value = '';
  document.getElementById('inp-code').value = '';
  document.getElementById('add-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openEditModal(s) {
  document.getElementById('add-modal-title').textContent = '✏️ Editar seção';
  document.getElementById('btn-save-label').textContent = 'Salvar alterações';
  document.getElementById('inp-edit-id').value = s.id;
  document.getElementById('inp-name').value = s.name;
  document.getElementById('inp-category').value = s.category;
  document.getElementById('inp-type').value = s.type;
  document.getElementById('inp-preview').value = s.preview || '';
  document.getElementById('inp-code').value = s.code || '';
  document.getElementById('add-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAddModal(e) {
  if (e && e.target !== document.getElementById('add-modal-bg')) return;
  document.getElementById('add-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function saveSection() {
  const name     = document.getElementById('inp-name').value.trim();
  const category = document.getElementById('inp-category').value;
  const type     = document.getElementById('inp-type').value;
  const preview  = document.getElementById('inp-preview').value.trim();
  const code     = document.getElementById('inp-code').value.trim();
  const editId   = document.getElementById('inp-edit-id').value;

  if (!name) { alert('Dê um nome para a seção.'); return; }
  if (!code)  { alert('Cole o código da seção.'); return; }

  if (editId) {
    // EDITAR existente
    const idx = sections.findIndex(s => String(s.id) === String(editId));
    if (idx !== -1) {
      sections[idx] = { ...sections[idx], name, category, type, preview, code };
    }
  } else {
    // NOVO
    sections.unshift({ id: Date.now(), name, category, type, preview, code });
  }

  localStorage.setItem('immerse-sections', JSON.stringify(sections));
  closeAddModal();
  render();
}

function deleteSection(id, nome) {
  if (!confirm(`Deletar "${nome}"?\n\nEssa ação não pode ser desfeita.`)) return;
  sections = sections.filter(s => s.id !== id);
  localStorage.setItem('immerse-sections', JSON.stringify(sections));
  render();
}

// ── FILTROS ───────────────────────────────────────────────────────────
function filterCategory(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = cat;
  render();
}

function filterType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  render();
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  render();
});

// ── ESC para fechar modais ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('add-modal-bg').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── UTILS ─────────────────────────────────────────────────────────────
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// ── INIT ──────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
